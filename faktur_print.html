<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Invoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      background: #fff;
      font-size: 12px;
    }

    .bordered th,
    .bordered td {
      border: 1px solid #e2e8f0;
      padding: 4px 6px;
    }

    .total-row {
      background-color: #f8fafc;
    }

    .compact-table {
      font-size: 11px;
    }

    .compact-table th,
    .compact-table td {
      padding: 3px 4px;
    }
  </style>
  <script>
    document.write('<script src="./assets/js/api.js?v=' + new Date().getTime() + '"><\/script>');
  </script>

</head>

<body>
  <div id="invoiceContainer" class="w-[210mm] mx-auto p-[10mm] bg-white"></div>


  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const pesanan_id = urlParams.get("id");
    const isDownload = urlParams.get("mode") === "download";
    const container = document.getElementById("invoiceContainer");

    const formatRp = val => `Rp ${(+val).toLocaleString("id-ID")}`;

    function terbilang(n) {
      const satuan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
      n = Math.floor(n);
      if (n < 12) return satuan[n];
      if (n < 20) return terbilang(n - 10) + " Belas";
      if (n < 100) return terbilang(Math.floor(n / 10)) + " Puluh " + terbilang(n % 10);
      if (n < 200) return "Seratus " + terbilang(n - 100);
      if (n < 1000) return terbilang(Math.floor(n / 100)) + " Ratus " + terbilang(n % 100);
      if (n < 2000) return "Seribu " + terbilang(n - 1000);
      if (n < 1000000) return terbilang(Math.floor(n / 1000)) + " Ribu " + terbilang(n % 1000);
      if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + " Juta " + terbilang(n % 1000000);
      return "";
    }

    async function loadSubCategories() {
      try {
        const res = await fetch(`${baseUrl}/list/sub_category/${owner_id}`, {
          headers: { Authorization: `Bearer ${API_TOKEN}` }
        });
        const result = await res.json();
        return result.listData || [];
      } catch (err) {
        console.error("Gagal memuat kategori", err);
        return [];
      }
    }

    async function loadPesananData() {
      try {
        // 🔹 Ambil detail pesanan langsung
        const pesananRes = await fetch(`${baseUrl}/detail/sales/${pesanan_id}`, {
          headers: { Authorization: `Bearer ${API_TOKEN}` }
        });
        const pesananResult = await pesananRes.json();
        const data = pesananResult?.detail;
        if (!data) throw new Error("Data pesanan tidak ditemukan");

        // 🔹 Group items berdasarkan sub_category langsung dari API
        const groupedItems = data.items.reduce((acc, item) => {
          const category = item.sub_category || "Lainnya";
          if (!acc[category]) acc[category] = [];
          acc[category].push(item);
          return acc;
        }, {});

        // 🔹 Render tabel grouped dengan nomor global
        let globalIndex = 1;
        const tableRows = Object.entries(groupedItems).map(([category, items]) => `
      <tr class="bg-gray-200">
        <td colspan="6" class="p-1 font-bold text-gray-800 text-xs">${category}</td>
      </tr>
      ${items.map(item => `
        <tr>
          <td class="text-center text-gray-700">${globalIndex++}</td>
          <td class="text-gray-800">
            <p class="font-medium">${item.product || '-'}</p>
            ${item.description ? `<p class="text-xs text-gray-500 mt-0">${item.description}</p>` : ''}
          </td>
          <td class="text-center text-gray-700">${item.qty || 0}</td>
          <td class="text-center text-gray-700">${item.unit || '-'}</td>
          <td class="text-right text-gray-800">${formatRp(item.unit_price || 0)}</td>
          <td class="text-right text-gray-800 font-medium">${formatRp(item.total || 0)}</td>
        </tr>
      `).join('')}
    `).join('');

        // 🔹 Info revisi
        const revisionInfo = data.revision_status && data.revision_number
          ? `${data.revision_status}`
          : '-';

        // 🔹 Tentukan apakah status WON
        const isWon = data.status_id == 2 || data.status_sales === "Won";

        const headerTitle = isWon ? "INVOICE" : "QUOTATION";
        const detailTitle = isWon ? "Invoice" : "Quotation";
        const noLabel = isWon ? "No Invoice" : "No Qtn";
        const noValue = isWon ? (data.inv_number || data.no_qtn) : data.no_qtn;

        // 🔹 Signature Section sesuai status
        let signatureSection = "";
        if (isWon) {
          signatureSection = `
        <div class="text-sm text-right">
          <p>Jakarta, ${data.formatted_date}</p>
          <div class="mt-2">
            <img src="materai.png"  class="h-20 ml-auto">
          </div>
          <p class="mt-2 font-semibold">Nanda Febby Yullantina</p>
          <p>Finance Manager</p>
        </div>
      `;
        } else {
          // Kalau Quotation
          signatureSection = `
        <div class="text-sm text-right"> <p>APPROVED BY</p> <div class="mt-2"> <img src="materai.png" class="h-20 ml-auto"> </div> <p class="mt-2 font-semibold">Rian Septiadi Saimima</p> </div> </div> <div class="text-xs mt-5 text-center"> <p> If you have any questions about this quotations, please contact<br> Nanda Febby Yuliantina, 082371425300, nandafebby@dinasti.id</p> </div>
      `;

        }

        // 🔹 Render HTML
        const html = `
      <!-- Header -->
      <div class="relative mb-2">
        <div class="absolute left-0 top-0">
          <img src="./assets/img/cropped-logo.png" class="h-12" />
        </div>
        <div class="text-center">
          <h1 class="font-bold text-red-700 text-base">PT. DINASTI ELEKTRIK INDONESIA</h1>
          <p class="text-xs font-semibold">ELEKTRIKAL ENGINEERING & MAINTENANCE</p>
          <p class="text-[10px]">
            Jl. Krisa Ayu 4 RT/RW 002/008 Blok A3 No. 19, Cipondoh, Tangerang<br>
            Telp.: 0823-7142-5300, Email: admin@dinasti.id
          </p>
        </div>
      </div>
      <hr class="border-t-2 border-black mb-2 w-full">

      <!-- Client and Invoice Info -->
      <div class="flex justify-between mb-4 p-2 bg-gray-50 rounded text-xs">
        <div>
          <h3 class="font-bold text-gray-700 mb-1">Kepada YTH:</h3>
          <p class="font-semibold text-gray-800">${data.pic_name}</p>
          <p class="font-semibold text-gray-800">${data.pelanggan_nama}</p>
          <p class="text-gray-800 max-w-[350px] break-words">${data.alamat}</p>
          ${data.project_name ? `<p class="text-gray-600">${data.project_name}</p>` : ''}
        </div>
        <div class="text-right">
          <h3 class="font-bold text-gray-700 mb-1">${detailTitle}:</h3>
          <p class="text-gray-600"><strong>${noLabel}:</strong> ${noValue}</p>
          <p class="text-gray-600"><strong>Tanggal:</strong> ${data.tanggal_invoice}</p>
          <p class="text-gray-600"><span class="font-medium">No. Revisi:</span> ${revisionInfo}</p>
        </div>
      </div>

      <!-- Table Items -->
      <table class="w-full compact-table border-collapse bordered mb-3">
        <thead class="bg-gray-100">
          <tr class="text-gray-700">
            <th class="text-center w-8">No</th>
            <th class="text-left">Produk</th>
            <th class="text-center w-12">Qty</th>
            <th class="text-center w-12">Satuan</th>
            <th class="text-right w-24">Harga Satuan</th>
            <th class="text-right w-24">Jumlah</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
        </tbody>
      </table>

      <!-- Totals -->
      <div class="flex justify-end mb-3">
        <table class="text-xs w-64">
          <tr>
            <td class="pr-3 py-0.5 text-right font-semibold text-gray-700">Sub Total</td>
            <td class="py-0.5 text-right text-gray-800">${formatRp(data.subtotal)}</td>
          </tr>
          <tr>
            <td class="pr-3 py-0.5 text-right font-semibold text-gray-700">Discount</td>
            <td class="py-0.5 text-right text-gray-800">${formatRp(data.disc)}</td>
          </tr>
          <tr>
            <td class="pr-3 py-0.5 text-right font-semibold text-gray-700">PPN 11%</td>
            <td class="py-0.5 text-right text-gray-800">${formatRp(data.ppn)}</td>
          </tr>
          <tr class="font-bold border-t border-gray-300 total-row">
            <td class="pr-3 py-1 text-right text-gray-900">TOTAL</td>
            <td class="py-1 text-right text-red-600">${formatRp(data.total)}</td>
          </tr>
        </table>
      </div>

      <!-- Terbilang -->
      <div class="text-xs mb-3">
        <span class="font-semibold text-gray-700">Terbilang:</span>
        <span class="italic text-gray-800">${terbilang(data.total)} Rupiah</span>
      </div>

      <!-- Notes + Signature -->
      <div class="flex justify-between items-start mt-6 text-xs">
        <div class="w-1/2">
          <p class="font-semibold text-gray-700 mb-1">Catatan:</p>
          <p class="text-gray-700 mb-1">
            ${data.catatan && data.catatan.trim() !== "" && data.catatan !== "-" ? data.catatan : "-"}
          </p>
        </div>
        ${signatureSection}
      </div>
    `;

        container.innerHTML = html;

        if (isDownload) {
          setTimeout(() => {
            html2pdf().set({
              margin: 0,
              filename: `${noValue || "invoice"}.pdf`,
              image: { type: "jpeg", quality: 0.98 },
              html2canvas: { scale: 2 },
              jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
            }).from(container).save();
          }, 1000);
        }

      } catch (err) {
        console.error("Gagal memuat pesanan", err);
        alert("Gagal memuat data pesanan.");
      }
    }



    window.onload = loadPesananData;
  </script>
</body>

</html>
