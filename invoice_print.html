<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Print</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @media print {
      body {
        padding: 20px;
        font-size: 14px;
      }

      .no-print {
        display: none !important;
      }

      .page-break {
        page-break-after: always;
      }
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .invoice-container {
      max-width: 800px;
      margin: 0 auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      padding: 8px 12px;
      text-align: left;
      border: 1px solid #e2e8f0;
    }

    th {
      background-color: #f7fafc;
      font-weight: 600;
    }

    .total-row {
      border-top: 2px solid #cbd5e0;
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <div class="no-print flex justify-between mb-4">
      <button onclick="window.history.back()"
        class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded inline-flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
            clip-rule="evenodd" />
        </svg>
        Kembali
      </button>
      <button onclick="window.print()"
        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded inline-flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z"
            clip-rule="evenodd" />
        </svg>
        Cetak
      </button>
    </div>

    <div id="invoiceContent" class="bg-white rounded-lg shadow-md p-6">
      <!-- Invoice content will be loaded here -->
      <div class="text-center py-8">
        <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 rounded-full border-t-transparent">
        </div>
        <p class="mt-2 text-gray-600">Memuat invoice...</p>
      </div>
    </div>
  </div>

  <script>
    // Base configuration

    // Get parameters from URL
    const urlParams = new URLSearchParams(window.location.search);
    const historyId = urlParams.get("history_id");
    const isDownload = urlParams.get("mode") === "download";

    document.addEventListener("DOMContentLoaded", function () {
      if (historyId) {
        loadInvoiceData(historyId);
      } else {
        showError("No history_id provided in URL");
      }
    });

    async function loadInvoiceData(historyId) {
      try {
        const response = await fetch(`https://devdinasti.katib.cloud/detail/sales_log/${historyId}`, {
          headers: { Authorization: `Bearer e29c2e3db5f5299dc954eae580893689c35ecde79f40213365f56fb54850f9b1` }
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        if (data.response !== "200" || !data.detail) {
          throw new Error("Data invoice tidak ditemukan");
        }

        renderInvoice(data.detail);

        // Auto download if in download mode
        if (isDownload) {
          setTimeout(() => {
            window.print();
          }, 1000);
        }
      } catch (error) {
        showError(`Gagal memuat invoice: ${error.message}`);
        console.error("Error:", error);
      }
    }

    function renderInvoice(invoiceData) {
      if (!invoiceData) return;

      // Ensure items is an array
      const items = Array.isArray(invoiceData.items) ? invoiceData.items : [];

      const revisionInfo = invoiceData.revision_status && invoiceData.revision_number
        ? `${invoiceData.revision_status}`
        : '-';

      const itemsHtml = items.map((item, idx) => `
        <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}">
          <td class="p-3 text-center text-gray-700">${idx + 1}</td>
          <td class="p-3 text-gray-800">
            <p class="font-medium">${item.product || '-'}</p>
            <p class="text-xs text-gray-500 mt-1">${item.description || ''}</p>
          </td>
          <td class="p-3 text-center text-gray-700">${item.qty || 0}</td>
          <td class="p-3 text-center text-gray-700">${item.unit || '-'}</td>
          <td class="p-3 text-right text-gray-800">${formatCurrency(item.unit_price || 0)}</td>
          <td class="p-3 text-right text-gray-800 font-medium">${formatCurrency(item.total || 0)}</td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="text-center py-4">No items found</td></tr>';

      const html = `
        <div class="invoice-container">
          <!-- HEADER -->
          <div class="relative mb-2">
            <!-- Logo di kiri -->
            <div class="absolute left-0 top-0">
              <img src="./assets/img/cropped-logo.png" class="h-16" />
            </div>

            <!-- Teks center di halaman -->
            <div class="text-center">
              <h1 class="font-bold text-red-700 text-lg">PT. DINASTI ELEKTRIK INDONESIA</h1>
              <p class="text-xs font-semibold">ELEKTRIKAL ENGINEERING & MAINTENANCE</p>
              <p class="text-xs">
                Jl. Krisa Ayu 4 RT/RW 002/008 Blok A3 No. 19, Cipondoh, Tangerang<br>
                Telp.: 0823-7142-5300, Email: admin@dinasti.id
              </p>
            </div>
          </div>

          <!-- Garis bawah -->
          <hr class="border-t-4 border-black mb-4 w-full">

          <!-- Client and Invoice Info -->
          <div class="flex justify-between mb-8 p-4 bg-gray-50 rounded-lg">
            <div class="text-sm">
              <h3 class="font-bold text-gray-700 mb-2">Kepada YTH:</h3>
              <p class="font-semibold text-gray-800">${invoiceData.pelanggan_nama || '-'}</p>
              ${invoiceData.project_name ? `<p class="text-gray-600">${invoiceData.project_name}</p>` : ''}
              ${invoiceData.project_type ? `<p class="text-gray-600">${invoiceData.project_type}</p>` : ''}
            </div>
            <div class="text-sm text-right">
              <h3 class="font-bold text-gray-700 mb-2">Detail Invoice:</h3>
              <p class="text-sm text-gray-600 mt-1"><strong>No:</strong> ${invoiceData.no_qtn || '-'}</p>
              <p class="text-sm text-gray-600"><strong>Tanggal:</strong> ${invoiceData.tanggal_invoice === "00/00/0000" ? '-' : invoiceData.tanggal_invoice}</p>
              <p class="text-gray-600"><span class="font-medium">No. Revisi:</span> ${revisionInfo}</p>
            </div>
          </div>

          <!-- PRODUCT TABLE -->
          <table class="w-full text-sm border-collapse mb-6">
            <thead class="bg-gray-100">
              <tr class="text-gray-700">
                <th class="p-3 text-center w-10">No</th>
                <th class="p-3 text-left">Description</th>
                <th class="p-3 text-center w-16">Qty</th>
                <th class="p-3 text-center w-16">Satuan</th>
                <th class="p-3 text-right w-24">Harga Satuan</th>
                <th class="p-3 text-right w-28">Jumlah</th>
              </tr>
            </thead>
            <tbody>
              ${itemsHtml}
            </tbody>
          </table>

          <!-- Totals -->
          <div class="flex justify-end mb-6">
            <table class="text-sm w-72">
              <tr>
                <td class="pr-4 py-2 text-right font-semibold text-gray-700">Sub Total</td>
                <td class="py-2 text-right text-gray-800">${formatCurrency(invoiceData.subtotal || 0)}</td>
              </tr>
              <tr>
                <td class="pr-4 py-2 text-right font-semibold text-gray-700">PPN 11%</td>
                <td class="py-2 text-right text-gray-800">${formatCurrency(invoiceData.ppn || 0)}</td>
              </tr>
              <tr class="font-bold border-t-2 border-gray-300 total-row">
                <td class="pr-4 py-3 text-right text-gray-900">TOTAL</td>
                <td class="py-3 text-right text-red-600">${formatCurrency(invoiceData.total_order || 0)}</td>
              </tr>
            </table>
          </div>

          <!-- Terbilang -->
          <div class="text-sm mb-8 p-3 bg-gray-50 rounded">
            <span class="font-semibold text-gray-700">Terbilang:</span> 
            <span class="italic text-gray-800">${terbilang(invoiceData.total_order || 0)} Rupiah</span>
          </div>

          <!-- Payment Info -->
          <div class="text-sm mb-8 p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
            <p class="font-semibold text-blue-700 mb-2">Pembayaran dapat dilakukan melalui:</p>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <p class="text-gray-700"><span class="font-medium">Bank:</span> BCA (Bank Central Asia)</p>
                <p class="text-gray-700"><span class="font-medium">Nama:</span> PT Dinasti Elektrik Indonesia</p>
                <p class="text-gray-700"><span class="font-medium">No. Rekening:</span> 629-0798777</p>
              </div>
            </div>
          </div>

          <!-- Notes and Signature -->
          <div class="flex justify-between items-end mt-12">
            <div class="text-sm w-1/2">
              <p class="font-semibold text-gray-700 mb-2">Catatan:</p>
              <ul class="list-disc list-inside text-gray-600">
                <li>Barang yang sudah dibeli tidak dapat dikembalikan</li>
                <li>Pembayaran dianggap lunas setelah dana diterima</li>
                <li>Invoice ini valid tanpa tanda tangan</li>
              </ul>
            </div>
            <div class="text-center signature-area w-1/2">
              <p class="text-sm text-gray-600">Jakarta, ${invoiceData.tanggal_invoice === "00/00/0000" ? '-' : invoiceData.tanggal_invoice}</p>
              <p class="text-sm text-gray-600 mb-8">Hormat kami,</p>
              <div class="flex justify-center space-x-8">
                <div>
                  <img src="./assets/img/ttd.png" class="h-14 mx-auto mb-1" />
                </div>
                <div>
                  <img src="./assets/img/stempel.png" class="h-14 mx-auto mb-1" />
                </div>
              </div>
              <p class="text-sm font-bold text-gray-800 mt-2">PT. DINASTI ELEKTRIK INDONESIA</p>
            </div>
          </div>
          
          <!-- Footer -->
          <div class="mt-8 pt-4 border-t border-gray-200 text-xs text-center text-gray-500">
            <p>Terima kasih atas kepercayaan Anda kepada PT Dinasti Elektrik Indonesia</p>
            <p class="mt-1">Invoice ini dikeluarkan secara elektronik dan tidak memerlukan tanda tangan</p>
          </div>
        </div>
      `;

      document.getElementById('invoiceContent').innerHTML = html;
    }

    function formatCurrency(num) {
      return new Intl.NumberFormat('id-ID').format(num);
    }

    function terbilang(angka) {
      // Simple implementation - replace with a complete one if needed
      const bilangan = [
        '', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima',
        'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh'
      ];

      if (angka < 11) return bilangan[angka] + ' Rupiah';
      if (angka < 20) return bilangan[angka - 10] + ' Belas Rupiah';
      if (angka < 100) return bilangan[Math.floor(angka / 10)] + ' Puluh ' + (angka % 10 !== 0 ? bilangan[angka % 10] : '') + ' Rupiah';
      if (angka < 200) return 'Seratus ' + terbilang(angka - 100);
      if (angka < 1000) return bilangan[Math.floor(angka / 100)] + ' Ratus ' + terbilang(angka % 100);
      if (angka < 2000) return 'Seribu ' + terbilang(angka - 1000);
      if (angka < 1000000) return terbilang(Math.floor(angka / 1000)) + ' Ribu ' + terbilang(angka % 1000);
      if (angka < 1000000000) return terbilang(Math.floor(angka / 1000000)) + ' Juta ' + terbilang(angka % 1000000);

      return 'Angka terlalu besar';
    }

    function showError(message) {
      document.getElementById('invoiceContent').innerHTML = `
        <div class="bg-red-50 border-l-4 border-red-500 p-4">
          <div class="flex items-center">
            <div class="flex-shrink-0">
              <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
              </svg>
            </div>
            <div class="ml-3">
              <p class="text-sm text-red-700">${message}</p>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>

</html>
