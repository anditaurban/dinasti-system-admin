<div class="bg-white p-4">
  <section class="section">
    <div class="flex flex-wrap items-start justify-between mb-4 gap-4">
      <div>
        <h1 class="text-2xl font-bold mb-1">Quotation</h1>
        <nav class="text-gray-500 dark:text-gray-400 text-sm flex items-center flex-wrap gap-1">
          <span>Home</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
          <span>Quotation</span>
        </nav>
      </div>
    </div>

    <!-- Filter & Action Bar -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-4 text-sm">
      <!-- Search -->
      <div class="flex items-center justify-center md:justify-start gap-2 w-full md:w-auto">
        <label for="searchInput" class="font-medium">Pencarian:</label>
        <input type="text" onkeyup="debounceSearch()" id="searchInput" placeholder="Cari data penjualan..."
          class="px-3 py-2 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-600 w-full md:w-96">
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-wrap justify-center md:justify-end items-center gap-2 w-full md:w-auto text-center">
        <!-- Tampilkan Dropdown -->
        <div class="relative">
          <button id="addButton" onclick="loadStatusOptions(1)"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm flex items-center justify-center gap-2">
            <span>+ Buat Faktur</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm border dark:border-gray-700">
        <thead id="tableHeader"
          class="hidden md:table-header-group bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
          <tr>
            <th class="px-4 py-2 border">No</th>
            <th class="px-4 py-2 border">Date</th>
            <th class="px-4 py-2 border">Quotation#</th>
            <th class="px-4 py-2 border">Type</th>
            <th class="px-4 py-2 border">Amount</th>
            <th class="px-4 py-2 border">Pajak</th>
            <th class="px-4 py-2 border">Client</th>
            <th class="px-4 py-2 border">Status</th>
            <th class="px-4 py-2 border">Revision</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Pagination + Info -->
    <div class="mt-4 flex flex-col md:flex-row md:justify-between md:items-center gap-2">
      <!-- Info Text: hanya tampil di desktop -->
      <p id="infoText" class="hidden md:block text-gray-600 dark:text-gray-400 text-sm text-left"></p>

      <!-- Pagination: hanya tampil di desktop -->
      <div id="pagination" class="hidden md:flex w-full justify-between items-center flex-wrap gap-2 text-sm"></div>

      <!-- Mobile Page Selector -->
      <div class="block md:hidden text-sm text-center mb-12">
        <label for="pageSelect" class="mr-2">Go to Page:</label>
        <select id="pageSelect"
          class="px-2 py-1 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-600"></select>
      </div>
    </div>

    <!-- Add Invoice Modal -->
    <div id="invoiceModal"
      class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 transition-opacity duration-300">
      <div id="invoiceBox"
        class="bg-white p-6 rounded-lg shadow-lg w-96 transform scale-90 opacity-0 transition-all duration-300 ease-out">
        <h2 class="text-lg font-semibold mb-4">Add Invoice</h2>
        <form id="invoiceForm" class="space-y-4">
          <input type="hidden" id="invoicePesananId" />

          <div>
            <label class="block text-sm font-medium mb-1">PO Number</label>
            <input type="text" id="po_number" class="w-full border rounded px-3 py-2" required />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Invoice Date</label>
            <input type="date" id="invoice_date" class="w-full border rounded px-3 py-2" required />
          </div>

          <div class="flex justify-end space-x-2">
            <button type="button" onclick="closeInvoiceModal()" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Tambah</button>
          </div>
        </form>
      </div>
    </div>

    <div id="salesReceiptModal"
      class="fixed inset-0 hidden flex items-center justify-center bg-black bg-opacity-50 z-50 transition-opacity duration-300">
      <div id="salesReceiptContent"
        class="bg-white rounded-lg shadow-lg w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 relative transform transition-all duration-300 scale-95 opacity-0">
        <!-- Header -->
        <div class="flex justify-between items-center border-b pb-3 mb-4">
          <h2 class="text-lg font-semibold text-gray-700">Tambah Sales Receipt</h2>
          <button onclick="closeSalesReceiptModal()" class="text-gray-500 hover:text-gray-700">&times;</button>
        </div>

        <!-- Form -->
        <form id="salesReceiptForm" class="space-y-4" enctype="multipart/form-data">
          <!-- Hidden untuk ID -->
          <input type="hidden" id="sr_pesanan_id" name="pesanan_id">
          <input type="hidden" id="sr_pelanggan_id" name="pelanggan_id">
          <input type="hidden" id="owner_id" name="owner_id" value="1">
          <input type="hidden" id="user_id" name="user_id" value="1">
          <input type="hidden" id="branch_id" name="branch_id" value="1">

          <!-- Tanggal Transaksi -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Tanggal Transaksi</label>
            <input type="date" id="tanggal_transaksi" name="tanggal_transaksi" class="w-full border rounded px-3 py-2"
              required>
          </div>

          <!-- Nominal -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Nominal</label>
            <input type="number" id="nominal" name="nominal" class="w-full border rounded px-3 py-2"
              placeholder="Masukkan nominal" required>
          </div>

          <!-- Transaction Type -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Transaction Type</label>
            <select id="transaction_type" name="transaction_type" class="w-full border rounded px-3 py-2">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>

          <!-- Category -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Category</label>
            <input type="text" id="category" name="category" value="payment" class="w-full border rounded px-3 py-2"
              placeholder="Contoh: payment" required>
          </div>

          <!-- Jenis Transaksi -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Jenis Transaksi</label>
            <select id="jenis_transaksi" name="jenis_transaksi" class="w-full border rounded px-3 py-2">
              <option value="bank">Bank</option>
              <option value="cash">Cash</option>
              <option value="ewallet">E-Wallet</option>
            </select>
          </div>

          <!-- Tipe -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Tipe</label>
            <input type="text" id="tipe" name="tipe" value="receipt" readonly
              class="w-full border rounded px-3 py-2 bg-gray-100">
          </div>

          <!-- Keterangan -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Keterangan</label>
            <textarea id="keterangan" name="keterangan" rows="2" class="w-full border rounded px-3 py-2"
              placeholder="Masukkan keterangan"></textarea>
          </div>

          <!-- Akun -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Akun</label>
            <input type="text" id="akun" name="akun" class="w-full border rounded px-3 py-2"
              placeholder="Contoh: Bank ABC">
          </div>

          <!-- No Rekening -->
          <div>
            <label class="block text-sm font-medium text-gray-700">No Rekening</label>
            <input type="text" id="no_rekening" name="no_rekening" class="w-full border rounded px-3 py-2"
              placeholder="Contoh: 123456789">
          </div>

          <!-- File -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Upload File</label>
            <input type="file" id="file" name="file" class="w-full border rounded px-3 py-2">
          </div>

          <!-- Submit -->
          <div class="flex justify-end gap-2 pt-4 border-t">
            <button type="button" onclick="closeSalesReceiptModal()"
              class="px-4 py-2 bg-gray-300 rounded">Batal</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Simpan</button>
          </div>
        </form>
      </div>
    </div>

  </section>
</div>
