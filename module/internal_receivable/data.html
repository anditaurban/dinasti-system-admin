<div class="bg-white p-6 rounded-lg shadow">
  <section class="space-y-6">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between mb-4 gap-4">
      <div>
        <h1 id="pageTitle" class="text-2xl font-bold mb-1"></h1>
        <nav id="breadcrumb" class="text-gray-500 text-sm flex items-center flex-wrap gap-1"></nav>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 text-sm">

      <!-- Search -->
      <div class="w-full md:w-auto">
        <input type="text" id="searchInput" onkeyup="debounceSearch()" placeholder="🔎 Cari..."
          class="px-3 py-2 border rounded w-full md:w-96" />
      </div>

      <!-- Actions -->
      <div class="flex flex-wrap items-center justify-end gap-2 w-full md:w-auto">

        <!-- Export Dropdown -->
        <button onclick="exportData()"
          class="bg-green-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm flex items-center gap-2">
          <span>Export</span>
        </button>


        <!-- Filter Dropdown -->


        <!-- Add Button -->
        <button id="addButton" class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded">
          + Create 
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto shadow-sm rounded-lg border border-gray-200">
  <table class="min-w-full text-sm">
    <thead id="tableHeader" class="hidden md:table-header-group bg-gray-100 text-gray-700 font-semibold border-b border-gray-300">
      <tr>
        <th class="px-4 py-3 text-left border-r border-gray-300 w-[15%]">Tanggal</th>
        
        <th class="px-4 py-3 text-left border-r border-gray-300 w-[20%]">Karyawan & Kategori</th>
        
        <th class="px-4 py-3 text-left border-r border-gray-300">Keterangan</th>
        <th class="px-4 py-3 text-left border-r border-gray-300">Nominal</th>
        <th class="px-4 py-3 text-center border-r border-gray-300 w-[12%]">Status</th>
        
      </tr>
    </thead>
    <tbody id="tableBody" class="divide-y divide-gray-200 bg-white">
      </tbody>
  </table>
</div>

    <!-- Pagination -->
    <div class="mt-4 flex flex-col md:flex-row md:justify-between md:items-center gap-2">
      <p id="infoText" class="hidden md:block text-gray-600 text-sm"></p>
      <div id="pagination" class="hidden md:flex flex-wrap justify-between items-center gap-2 text-sm w-full"></div>

      <!-- Mobile Page Selector -->
      <div class="block md:hidden text-sm text-center mb-12">
        <label for="pageSelect" class="mr-2">Go to Page:</label>
        <select id="pageSelect" class="px-2 py-1 border rounded"></select>
      </div>
    </div>
  </section>
</div>
